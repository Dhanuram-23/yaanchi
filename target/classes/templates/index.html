<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Yaanchii | Fashion Store</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<nav class="navbar">

    <div class="logo">
        YAAN<span>CHII</span>
    </div>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="#">Men</a>
        <a href="#">Women</a>
        <a href="#">Accessories</a>
    </div>

    <div class="right-menu">

        <a href="/cart">
            Cart
        </a>

        <a href="/login" class="btn">
            Login
        </a>

        <a href="/signup" class="btn">
            Sign Up
        </a>

    </div>

</nav>

<section class="hero">

    <div class="hero-content">

        <h1>Fashion That Defines You</h1>

        <p>
            Discover premium collections exclusively at Yaanchii.
        </p>

        <a href="#products" class="hero-btn">
            Shop Now
        </a>

    </div>

</section>

<h2 class="section-title" id="products">
    Featured Collection
</h2>

<section class="product-grid">

    <div class="product-card"
         th:each="product : ${products}">

        <img class="product-image"
             th:src="${product.imageUrl}"
             alt="Product">

        <div class="product-info">

            <h3 class="product-name"
                th:text="${product.name}">
            </h3>

            <p class="product-price">
                ₹<span th:text="${product.price}"></span>
            </p>

            <div class="product-actions">

                <a class="btn"
                   th:href="@{/products/{id}(id=${product.id})}">
                    View
                </a>

                <form th:action="@{/cart/add/{id}(id=${product.id})}"
                      method="post">

                    <button class="btn" type="submit">
                        Add To Cart
                    </button>

                </form>

            </div>

        </div>

    </div>

</section>

<footer class="footer">

    <h3>YAANCHII</h3>

    <p>
        Fashion. Style. Confidence.
    </p>

    <br>

    <p>
        © 2026 Yaanchii. All Rights Reserved.
    </p>

</footer>

<script th:src="@{/js/app.js}"></script>

</body>
</html>
