<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title th:text="${product.name} + ' | Yaanchii'">
        Product Details
    </title>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>

        .product-details-container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
        }

        .product-layout {
            display: flex;
            gap: 50px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
        }

        .product-layout img {
            width: 450px;
            height: 550px;
            object-fit: cover;
            border-radius: 10px;
        }

        .product-content {
            flex: 1;
        }

        .product-content h1 {
            margin-bottom: 20px;
        }

        .product-content p {
            margin-bottom: 15px;
            line-height: 1.7;
        }

        .detail-price {
            color: #d63384;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        @media(max-width:900px){

            .product-layout{
                flex-direction: column;
            }

            .product-layout img{
                width: 100%;
                height: auto;
            }

        }

    </style>

</head>

<body>

<nav class="navbar">

    <div class="logo">
        YAAN<span>CHII</span>
    </div>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/cart">Cart</a>
    </div>

</nav>

<div class="product-details-container">

    <div class="product-layout">

        <img th:src="${product.imageUrl}"
             alt="Product Image">

        <div class="product-content">

            <h1 th:text="${product.name}">
                Product Name
            </h1>

            <div class="detail-price">

                ₹<span th:text="${product.price}"></span>

            </div>

            <p th:text="${product.description}">
                Product Description
            </p>

            <p>

                Available Stock:
                <strong th:text="${product.quantity}">
                    0
                </strong>

            </p>

            <br>

            <form th:action="@{/cart/add/{id}(id=${product.id})}"
                  method="post">

                <button type="submit"
                        class="btn">

                    Add To Cart

                </button>

            </form>

        </div>

    </div>

</div>

<footer class="footer">

    <h3>YAANCHII</h3>

    <p>Fashion. Style. Confidence.</p>

</footer>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
